<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1AA371"/>
      <stop offset="55%" stop-color="#0E8A5F"/>
      <stop offset="100%" stop-color="#06593E"/>
    </linearGradient>
    <radialGradient id="glow" cx="32%" cy="22%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="leaf" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#FFFCF4"/>
      <stop offset="100%" stop-color="#E8DDC4"/>
    </linearGradient>
  </defs>

  <!-- Background: rounded square matching iOS icon mask -->
  <rect width="1024" height="1024" rx="232" ry="232" fill="url(#bg)"/>
  <rect width="1024" height="1024" rx="232" ry="232" fill="url(#glow)"/>

  <!--
    Leaf shape: pointed top, gentle bulge, soft point at bottom.
    Slight tilt for organic asymmetry. Drawn at 0.78 scale relative to the
    canvas so the negative space breathes.
  -->
  <g transform="translate(512 512) rotate(-10) scale(1.0)">
    <!-- Soft drop shadow under leaf -->
    <path d="
      M 0 -360
      C 70 -354 240 -250 290 -90
      C 320 80 220 280 0 360
      C -220 280 -320 80 -290 -90
      C -240 -250 -70 -354 0 -360
      Z
    " fill="#06402C" opacity="0.22" transform="translate(10 18)"/>

    <!-- Main leaf body -->
    <path d="
      M 0 -360
      C 70 -354 240 -250 290 -90
      C 320 80 220 280 0 360
      C -220 280 -320 80 -290 -90
      C -240 -250 -70 -354 0 -360
      Z
    " fill="url(#leaf)"/>

    <!-- Center vein only — keep the icon clean at small sizes -->
    <path d="M 0 -340 C 12 -170 12 170 0 340" stroke="#0B6F4D" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.18"/>
  </g>
</svg>
