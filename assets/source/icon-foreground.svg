<?xml version="1.0" encoding="UTF-8"?>
<!--
  Adaptive-icon foreground for Android. The OS masks ~33% from each side and
  applies a circle / rounded-square / squircle. Keep the logo well inside the
  central 66% safe zone.
-->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="leaf" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#FFFCF4"/>
      <stop offset="100%" stop-color="#E8DDC4"/>
    </linearGradient>
  </defs>

  <g transform="translate(512 512) rotate(-10) scale(0.7)">
    <path d="
      M 0 -360
      C 70 -354 240 -250 290 -90
      C 320 80 220 280 0 360
      C -220 280 -320 80 -290 -90
      C -240 -250 -70 -354 0 -360
      Z
    " fill="#06402C" opacity="0.22" transform="translate(10 18)"/>
    <path d="
      M 0 -360
      C 70 -354 240 -250 290 -90
      C 320 80 220 280 0 360
      C -220 280 -320 80 -290 -90
      C -240 -250 -70 -354 0 -360
      Z
    " fill="url(#leaf)"/>
    <path d="M 0 -340 C 12 -170 12 170 0 340" stroke="#0B6F4D" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.18"/>
  </g>
</svg>
