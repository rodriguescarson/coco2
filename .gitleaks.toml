title = "gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Lockfile integrity hashes, public-by-design Firebase keys, templates, ASC issuer id"
paths = [
  '''Podfile\.lock''',
  '''package-lock\.json''',
  '''yarn\.lock''',
  '''pnpm-lock\.yaml''',
  '''\.env\.example''',
  '''\.env\.sample''',
  '''google-services\.json''',
  '''GoogleService-Info\.plist''',
]
regexTarget = "line"
regexes = [
  '''ascApiKeyIssuerId''',
  '''3a0248cc-5c1d-4eeb-813d-82e19a9cf785''',
]
